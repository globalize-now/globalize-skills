name: Claude Issue Backfill

# Manually-triggered sweep of all currently-open issues. Runs the Claude action
# directly per-issue (rather than posting comments) because comments authored
# by GITHUB_TOKEN don't trigger downstream workflows.
#
# Run from the GitHub UI: Actions -> Claude Issue Backfill -> Run workflow.

on:
  workflow_dispatch:
    inputs:
      label_filter:
        description: "Comma-separated labels (issues must have ALL). Default: ready."
        required: false
        default: "ready"
      max_issues:
        description: "Max issues to sweep (safety cap)."
        required: false
        default: "20"

jobs:
  list:
    runs-on: ubuntu-latest
    permissions:
      issues: read
    outputs:
      issues: ${{ steps.fetch.outputs.issues }}
      count: ${{ steps.fetch.outputs.count }}
    steps:
      - name: List open issues
        id: fetch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LABELS: ${{ inputs.label_filter }}
          MAX: ${{ inputs.max_issues }}
        run: |
          set -euo pipefail
          args=(--state open --limit "$MAX" --json number)
          if [ -n "${LABELS:-}" ]; then
            args+=(--label "$LABELS")
          fi
          json="$(gh issue list "${args[@]}" -R "$GITHUB_REPOSITORY" --jq '[.[].number]')"
          echo "Found issues: $json"
          echo "issues=$json"  >> "$GITHUB_OUTPUT"
          echo "count=$(echo "$json" | jq 'length')" >> "$GITHUB_OUTPUT"

  triage:
    needs: list
    if: needs.list.outputs.count != '0'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
      actions: read
    strategy:
      max-parallel: 1   # sequential to avoid clashing on shared branches/PRs
      fail-fast: false
      matrix:
        issue: ${{ fromJSON(needs.list.outputs.issues) }}
    concurrency:
      group: claude-issue-${{ matrix.issue }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude on issue #${{ matrix.issue }}
        env:
          # gh CLI inside the agent uses this token for all GitHub calls.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # IMPORTANT: in workflow_dispatch / automation mode the action does
          # NOT auto-post a comment to the issue. Claude must do it explicitly
          # via the gh CLI — that's why we (a) allow gh in --allowedTools and
          # (b) tell the prompt to use it.
          prompt: |
            You are running in automation mode against issue
            #${{ matrix.issue }} in ${{ github.repository }}.

            Steps you MUST follow:
            1. `gh issue view ${{ matrix.issue }} --comments` to read the issue and existing comments.
            2. Read CLAUDE.md in the repo root for the triage playbook.
            3. Explore the repo as the playbook says.
            4. Apply Phase 1–3 of the playbook (research → respond).
            5. Post your response by calling:
                  gh issue comment ${{ matrix.issue }} --body-file <path-to-md>
               or `--body "..."` for short replies. Do NOT skip this step — in
               automation mode no comment is posted unless you call gh yourself.
            6. Do NOT open a PR in this run. Wait for an explicit `@claude go`
               on the next conversational turn.
          claude_args: |
            --max-turns 25
            --allowedTools "Bash(gh issue view:*),Bash(gh issue comment:*),Bash(gh issue edit:*),Bash(gh issue list:*),Bash(gh label list:*),Bash(gh search:*),Bash(npm install),Bash(npm run build),Bash(npm run test:*),Bash(npm run lint:*),Bash(pnpm install),Bash(pnpm build),Bash(pnpm test),Bash(pnpm lint)"
