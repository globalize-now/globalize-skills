name: Claude Issue Backfill

# Manually-triggered sweep of all currently-open issues. Runs the Claude action
# directly per-issue (rather than posting comments) because comments authored
# by GITHUB_TOKEN don't trigger downstream workflows.
#
# Run from the GitHub UI: Actions -> Claude Issue Backfill -> Run workflow.

on:
  workflow_dispatch:
    inputs:
      label_filter:
        description: "Comma-separated labels (issues must have ALL). Default: ready."
        required: false
        default: "ready"
      max_issues:
        description: "Max issues to sweep (safety cap)."
        required: false
        default: "20"

jobs:
  list:
    runs-on: ubuntu-latest
    permissions:
      issues: read
    outputs:
      issues: ${{ steps.fetch.outputs.issues }}
      count: ${{ steps.fetch.outputs.count }}
    steps:
      - name: List open issues
        id: fetch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LABELS: ${{ inputs.label_filter }}
          MAX: ${{ inputs.max_issues }}
        run: |
          set -euo pipefail
          args=(--state open --limit "$MAX" --json number)
          if [ -n "${LABELS:-}" ]; then
            args+=(--label "$LABELS")
          fi
          json="$(gh issue list "${args[@]}" -R "$GITHUB_REPOSITORY" --jq '[.[].number]')"
          echo "Found issues: $json"
          echo "issues=$json"  >> "$GITHUB_OUTPUT"
          echo "count=$(echo "$json" | jq 'length')" >> "$GITHUB_OUTPUT"

  triage:
    needs: list
    if: needs.list.outputs.count != '0'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
      actions: read
    strategy:
      max-parallel: 1   # sequential to avoid clashing on shared branches/PRs
      fail-fast: false
      matrix:
        issue: ${{ fromJSON(needs.list.outputs.issues) }}
    concurrency:
      group: claude-issue-${{ matrix.issue }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude on issue #${{ matrix.issue }}
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Read CLAUDE.md in the repo root, then triage open issue
            #${{ matrix.issue }} in ${{ github.repository }}. This is a backfill
            sweep, so the issue may already have comments — review them before
            acting. Apply Phase 1–3 of the playbook (research → respond). Do
            not open a PR in this run; wait for an explicit `@claude go`.
          claude_args: |
            --max-turns 25
            --allowedTools "Bash(npm install),Bash(npm run build),Bash(npm run test:*),Bash(npm run lint:*),Bash(pnpm install),Bash(pnpm build),Bash(pnpm test),Bash(pnpm lint)"
